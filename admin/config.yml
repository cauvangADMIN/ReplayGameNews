backend:
  name: github
  repo: cauvangADMIN/ReplayGameNews
  branch: main
  base_url: https://decap-cms-oauth.vercel.app
  auth_endpoint: auth

# restore these (media_folder + public_folder)
media_folder: "images"        # nơi lưu file trong repo (nếu bạn lưu trên repo)
public_folder: "/images"      # đường dẫn public trong site

# nếu bạn vẫn muốn dùng custom media library endpoint (tương tự ban đầu)
media_library:
  name: custom
  config:
    endpoint: "/api/upload"

collections:
  - name: posts
    label: Posts
    folder: posts
    create: true
    slug: "{{slug}}"

    fields:
      - { label: Title, name: title, widget: string }
      - { label: Date, name: date, widget: datetime }
      - { label: Category, name: category, widget: string }
      - { label: Thumbnail, name: thumbnail, widget: image }
      - { label: Excerpt, name: excerpt, widget: string }
      - { label: Body, name: body, widget: markdown }