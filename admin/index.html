<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8"/>
<title>ReplayGameNews CMS</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<script>
window.CMS_MANUAL_INIT = true
</script>

<script src="https://unpkg.com/decap-cms@3.10.1/dist/decap-cms.js"></script>

<style>

body{
margin:0;
font-family:sans-serif;
}

/* modal */

.r2-modal{
position:fixed;
top:50%;
left:50%;
transform:translate(-50%,-50%);
background:#111;
padding:20px;
border-radius:10px;
width:90%;
max-width:900px;
max-height:80vh;
overflow:auto;
z-index:99999;
color:white;
}

.r2-header{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:15px;
}

.r2-close{
cursor:pointer;
font-size:20px;
}

.r2-upload{
margin-bottom:15px;
}

.r2-grid{
display:grid;
grid-template-columns:repeat(auto-fill,120px);
gap:12px;
}

.r2-grid img{
width:120px;
height:120px;
object-fit:cover;
border-radius:6px;
cursor:pointer;
transition:.2s;
}

.r2-grid img:hover{
transform:scale(1.05);
}

</style>

</head>

<body>

<div id="nc-root"></div>

<script>

/* upload file → R2 */

async function uploadToR2(file){

const form=new FormData()
form.append("file",file)

const res=await fetch("/api/upload",{
method:"POST",
body:form
})

const data=await res.json()

return data.path

}


/* create gallery UI */

async function openGallery(handleInsert){

const modal=document.createElement("div")
modal.className="r2-modal"

const header=document.createElement("div")
header.className="r2-header"

const title=document.createElement("div")
title.innerText="R2 Image Gallery"

const close=document.createElement("div")
close.innerText="✕"
close.className="r2-close"

close.onclick=()=>modal.remove()

header.appendChild(title)
header.appendChild(close)

modal.appendChild(header)


/* upload input */

const upload=document.createElement("input")
upload.type="file"
upload.className="r2-upload"

upload.onchange=async()=>{

const file=upload.files[0]

if(!file) return

const url=await uploadToR2(file)

handleInsert(url)

modal.remove()

}

modal.appendChild(upload)


/* fetch images */

const res=await fetch("/api/list-images")

const images=await res.json()

const grid=document.createElement("div")
grid.className="r2-grid"

images.forEach(url=>{

const img=document.createElement("img")

img.src=url

img.onclick=()=>{

handleInsert(url)

modal.remove()

}

grid.appendChild(img)

})

modal.appendChild(grid)

document.body.appendChild(modal)

}


/* register media library */

CMS.registerMediaLibrary({

name:"r2",

init(){},

show({handleInsert}){

console.log("Open R2 media library")

openGallery(handleInsert)

},

hide(){}

})


/* start CMS */

CMS.init()

</script>

</body>
</html>
