<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ReplayGameNews CMS</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <script>window.CMS_MANUAL_INIT = true;</script>
  <script src="https://unpkg.com/decap-cms@3.10.1/dist/decap-cms.js"></script>

  <style>
    #cms-debug { position: fixed; right: 12px; bottom: 12px; z-index:9999;
                 max-width:420px; max-height:40vh; overflow:auto;
                 font-family: monospace; font-size:12px; background:rgba(0,0,0,0.75);
                 color:#fff; padding:8px; border-radius:8px; display:none; }
    #cms-debug pre { color:#9f9; white-space:pre-wrap; margin:6px 0; }
  </style>
</head>
<body>
  <div id="nc-root"></div>
  <div id="cms-debug" aria-hidden="true"></div>

  <script>
  /* small debug helper */
  function dbg(msg, obj){
    try{
      const box = document.getElementById('cms-debug');
      box.style.display = 'block';
      const line = document.createElement('div');
      line.textContent = (new Date()).toLocaleTimeString() + ' — ' + msg;
      box.appendChild(line);
      if(obj !== undefined){
        const pre = document.createElement('pre');
        try { pre.textContent = JSON.stringify(obj, null, 2); }
        catch(e){ pre.textContent = String(obj); }
        box.appendChild(pre);
      }
      console.log('[CMS DEBUG]', msg, obj || '');
    }catch(e){
      console.log('[CMS DEBUG FAIL]', msg, e);
    }
  }

  /* Robust registerMediaLibrary implementation
     - Provides both show and open (alias)
     - Detects multiple callback names (handleInsert, onInsert)
     - Calls with ARRAY of {path,name,size}
     - Tries fallbacks if first approach causes CMS to throw
  */
  CMS.registerMediaLibrary({
    name: "custom",

    init: () => {
      dbg('custom media library init');
      console.log('Custom media library init');
    },

    // "show" is the canonical API name; "open" alias added for older/newer variants
    show: async function(args){
      return showImpl(args);
    },
    open: async function(args){
      return showImpl(args);
    },
    hide: () => {
      dbg('media.hide called');
    }
  });

  async function showImpl({ handleInsert, onInsert, insert, forImage, value, config } = {}){
    dbg('media.show called', { hasHandleInsert: !!handleInsert, hasOnInsert: !!onInsert, hasInsert: !!insert, forImage, value, config });

    // choose the callback the CMS actually gave us
    const callback = handleInsert || onInsert || insert || null;

    // create file input
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = 'image/*';

    input.onchange = async () => {
      const file = input.files && input.files[0];
      if(!file){ dbg('no file chosen'); return; }

      dbg('file chosen', { name:file.name, size:file.size, type:file.type });

      // prepare form
      const form = new FormData();
      form.append('file', file, file.name);

      try{
        dbg('posting to /api/upload (start)');

        const res = await fetch('/api/upload', { method:'POST', body: form });
        dbg('upload status', { status: res.status, ok: res.ok });

        // try parse JSON
        let data;
        try {
          data = await res.json();
        } catch(e) {
          const text = await res.text().catch(()=>null);
          dbg('upload parse error, response text', text);
          throw new Error('Upload API did not return JSON');
        }

        dbg('upload response json', data);

        const publicUrl = data.path || data.url || data.result;
        if(!publicUrl || typeof publicUrl !== 'string'){
          dbg('no usable url returned from API', data);
          throw new Error('Upload API returned no path/url');
        }

        // Build item object expected by Decap
        const item = { path: publicUrl, name: file.name, size: file.size };

        dbg('prepared item for insert', item);

        // Wait a beat — avoids race conditions inside some Decap versions
        await new Promise(r => setTimeout(r, 80));

        // If CMS provided an insert callback, use it. Try multiple fallbacks if needed.
        if(callback){
          try{
            dbg('calling callback with array');
            callback([item]); // preferred
            dbg('callback(array) succeeded');
            return;
          }catch(cbErr){
            dbg('callback(array) threw', String(cbErr));
            // try single object
            try{
              dbg('trying callback(single object) fallback');
              callback(item);
              dbg('callback(object) succeeded');
              return;
            }catch(cbErr2){
              dbg('callback(object) also threw', String(cbErr2));
              // try raw string
              try{
                dbg('trying callback(string) fallback');
                callback(publicUrl);
                dbg('callback(string) succeeded');
                return;
              }catch(cbErr3){
                dbg('all callback fallbacks failed', { cbErr, cbErr2, cbErr3 });
                throw cbErr3 || cbErr2 || cbErr;
              }
            }
          }
        } else {
          // If no callback present, try calling global CMS method (last resort)
          dbg('no callback provided by CMS (handleInsert/onInsert missing)');
          // Some Decap versions expose `CMS.mediaLibrary` methods - try to insert via the content interface
          try {
            if(window.CMS && window.CMS.mediaLibrary && typeof window.CMS.mediaLibrary.insert === 'function'){
              dbg('using CMS.mediaLibrary.insert fallback');
              window.CMS.mediaLibrary.insert([item]);
              dbg('CMS.mediaLibrary.insert succeeded');
              return;
            }
          } catch(e){
            dbg('CMS.mediaLibrary.insert fallback failed', String(e));
          }
          throw new Error('No insert callback provided by CMS');
        }

      } catch (err){
        dbg('upload error', err && err.message ? err.message : String(err));
        console.error('Custom media library upload error:', err);
        // visible alert for testing
        alert('Upload failed: ' + (err && err.message ? err.message : String(err)));
      }
    };

    // trigger file picker
    input.click();
  }

  // init + debug when DOM ready
  dbg('before CMS.init');
  document.addEventListener('DOMContentLoaded', function(){
    try{
      dbg('calling CMS.init()');
      CMS.init();
      dbg('CMS.init returned');
    }catch(e){
      dbg('CMS.init threw', (e && e.message) ? e.message : String(e));
      console.error('CMS.init threw', e);
    }
  });

  </script>
</body>
</html>
