<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ReplayGameNews CMS</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- Decap CMS (cdn) -->
  <script src="https://unpkg.com/decap-cms@3.10.1/dist/decap-cms.js"></script>

  <style>
    #cms-debug {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 9999;
      max-width: 420px;
      max-height: 40vh;
      overflow: auto;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.75);
      color: #fff;
      padding: 8px;
      border-radius: 8px;
      display: none;
    }
    #cms-debug pre {
      color: #9f9;
      white-space: pre-wrap;
      margin: 6px 0;
    }
  </style>
</head>

<body>
  <div id="nc-root"></div>
  <div id="cms-debug" aria-hidden="true"></div>

  <script>
  // small debug helper
  function dbg(msg, obj){
    try{
      const box = document.getElementById('cms-debug');
      box.style.display = 'block';
      const line = document.createElement('div');
      line.textContent = (new Date()).toLocaleTimeString() + ' — ' + msg;
      box.appendChild(line);
      if(obj !== undefined){
        const pre = document.createElement('pre');
        try { pre.textContent = JSON.stringify(obj, null, 2); }
        catch(e){ pre.textContent = String(obj); }
        box.appendChild(pre);
      }
      console.log('[CMS DEBUG]', msg, obj || '');
    }catch(e){
      console.log('[CMS DEBUG FAIL]', msg, e);
    }
  }

  // upload helper: posts file to /api/upload, returns public URL string
  async function uploadToR2(file){
    dbg('upload start', { name: file.name, size: file.size, type: file.type });

    const form = new FormData();
    form.append('file', file, file.name);

    const res = await fetch('/api/upload', { method: 'POST', body: form });
    dbg('upload status', { status: res.status, ok: res.ok });

    if(!res.ok){
      const txt = await res.text().catch(()=>null);
      dbg('upload failed response text', txt);
      throw new Error('Upload API returned ' + res.status);
    }

    const data = await res.json().catch(()=>null);
    dbg('upload response json', data);

    const url = (data && (data.path || data.url || data.result)) || null;
    if(!url) throw new Error('Upload API did not return a path/url');

    return url;
  }

  // patch the image widget to upload directly to R2 (via /api/upload)
  function patchImageWidget(){
    try{
      const widget = CMS.getWidget('image');
      if(!widget) {
        dbg('CMS.getWidget("image") returned null');
        return;
      }

      const BaseControl = widget.controlComponent;

      class R2ImageControl extends BaseControl {
        // override handleChange (works with the built-in control's file input)
        async handleChange(files){
          if(!files || !files.length) return;
          const file = files[0];

          try{
            const url = await uploadToR2(file);
            dbg('uploaded url', url);
            // set field value to returned url
            this.props.onChange(url);
          }catch(err){
            console.error('Upload failed', err);
            alert('Upload failed: ' + (err && err.message ? err.message : String(err)));
          }
        }
      }

      // re-register widget (control + original preview)
      CMS.registerWidget('image', R2ImageControl, widget.previewComponent);
      dbg('image widget patched');
    }catch(e){
      dbg('patchImageWidget error', String(e));
      console.error(e);
    }
  }

  // init CMS and patch
  document.addEventListener('DOMContentLoaded', function(){
    dbg('before CMS.init');
    try{
      CMS.init();
      dbg('CMS.init returned');
    }catch(e){
      dbg('CMS.init threw', (e && e.message) ? e.message : String(e));
      console.error('CMS.init threw', e);
    }

    // patch after init
    setTimeout(()=> {
      try{ patchImageWidget(); }catch(e){ console.error(e); }
    }, 200);
  });

  </script>
</body>
</html>
