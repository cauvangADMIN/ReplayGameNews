<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ReplayGameNews CMS</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- bắt buộc: cho phép init thủ công để ta điều khiển thời điểm mount -->
  <script>window.CMS_MANUAL_INIT = true;</script>

  <!-- stable release -->
  <script src="https://unpkg.com/decap-cms@3.10.1/dist/decap-cms.js"></script>
</head>
<body>
  <!-- root: OK nếu có, nhưng CMS sẽ mount vào body nếu không có -->
  <div id="nc-root"></div>

  <script>
  /* register custom media library for Decap CMS */
  CMS.registerMediaLibrary({
    name: "custom",

    init: () => {
      console.log("Custom media library init");
    },

    show: async ({ handleInsert }) => {
      // tạo input file
      const input = document.createElement("input");
      input.type = "file";
      input.accept = "image/*";

      input.onchange = async () => {
        const file = input.files[0];
        if (!file) return;

        try {
          // debug: show file info
          console.log("Uploading file:", file.name, file.size, file.type);

          const form = new FormData();
          form.append("file", file, file.name);

          const res = await fetch("/api/upload", {
            method: "POST",
            body: form
          });

          const data = await res.json();
          console.log("Upload response:", data);

          // Expect API returns { path: "https://.../file.jpg" }
          const publicUrl = data.path || data.url || data.result;

          if (!publicUrl) {
            console.error("Upload API did not return a path/url");
            return;
          }

          // IMPORTANT: handleInsert expects an ARRAY of file objects.
          // Provide objects with at least `path` (and optional name/size).
          handleInsert([
            {
              path: publicUrl,
              name: file.name,
              size: file.size
            }
          ]);
        } catch (err) {
          console.error("Upload failed", err);
        }
      };

      // open file picker
      input.click();
    },

    hide: () => {
      // optional cleanup
    }
  });
  </script>

  <script>
    // debug helpers
    console.log('before CMS init, CMS object =', window.CMS);

    document.addEventListener('DOMContentLoaded', function () {
      try {
        console.log('DOM ready — calling CMS.init()');
        
        // init thủ công (CMS sẽ auto-load /admin/config.yml)
        CMS.init();
        console.log('CMS.init() returned');
      } catch (e) {
        console.error('CMS.init() threw', e);
        // show a visible error on the page so you don't see blank
        const p = document.createElement('pre');
        p.style.color = 'red';
        p.style.whiteSpace = 'pre-wrap';
        p.textContent = 'CMS init error: ' + (e && e.stack ? e.stack : String(e));
        document.body.appendChild(p);
      }
    });
  </script>
</body>
</html>
