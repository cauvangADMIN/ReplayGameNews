<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <title>ReplayGameNews CMS</title>
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <!-- IMPORTANT: prevent automatic init until we confirm CMS global exists -->
  <script>window.CMS_MANUAL_INIT = true;</script>

  <!-- Decap CMS bundle (CDN) -->
  <script src="https://unpkg.com/decap-cms@3.10.1/dist/decap-cms.js"></script>

  <style>
    #cms-debug {
      position: fixed;
      right: 12px;
      bottom: 12px;
      z-index: 9999;
      max-width: 420px;
      max-height: 40vh;
      overflow: auto;
      font-family: monospace;
      font-size: 12px;
      background: rgba(0,0,0,0.8);
      color: #fff;
      padding: 8px;
      border-radius: 8px;
      display: none;
    }
    #cms-debug pre { color: #9f9; white-space: pre-wrap; margin:6px 0; }
  </style>
</head>
<body>
  <div id="nc-root"></div>
  <div id="cms-debug" aria-hidden="true"></div>

<script>
/* debug helper */
function dbg(msg, obj){
  try{
    const box = document.getElementById('cms-debug');
    box.style.display = 'block';
    const line = document.createElement('div');
    line.textContent = (new Date()).toLocaleTimeString() + ' — ' + msg;
    box.appendChild(line);
    if(obj !== undefined){
      const pre = document.createElement('pre');
      try{ pre.textContent = JSON.stringify(obj, null, 2); } catch(e){ pre.textContent = String(obj); }
      box.appendChild(pre);
    }
    console.log('[CMS DEBUG]', msg, obj || '');
  }catch(e){
    console.log('[CMS DEBUG FAIL]', msg, e);
  }
}

/* wait until window.CMS is defined (timeout in ms) */
function waitForCMS(timeout = 6000) {
  return new Promise((resolve, reject) => {
    const start = Date.now();
    const iv = setInterval(() => {
      if (window.CMS) {
        clearInterval(iv);
        resolve(window.CMS);
        return;
      }
      if (Date.now() - start > timeout) {
        clearInterval(iv);
        reject(new Error('CMS global did not appear within timeout'));
      }
    }, 50);
  });
}

/* upload helper: posts file to /api/upload, returns public URL string */
async function uploadToR2(file){
  dbg('upload start', { name:file.name, size:file.size, type:file.type });
  const form = new FormData();
  form.append('file', file, file.name);

  const res = await fetch('/api/upload', { method: 'POST', body: form });
  dbg('upload status', { status: res.status, ok: res.ok });

  if(!res.ok){
    const txt = await res.text().catch(()=>null);
    dbg('upload failed response text', txt);
    throw new Error('Upload API returned ' + res.status);
  }

  const data = await res.json().catch(()=>null);
  dbg('upload response json', data);

  const url = (data && (data.path || data.url || data.result)) || null;
  if(!url) throw new Error('Upload API did not return a path/url');

  return url;
}

/* patch image widget: override control to upload to /api/upload then set field value to returned url */
function patchImageWidgetOnce(CMS){
  try{
    const widget = CMS.getWidget && CMS.getWidget('image');
    if(!widget){
      dbg('patchImageWidget: CMS.getWidget("image") returned null');
      return;
    }
    const BaseControl = widget.controlComponent;

    class R2ImageControl extends BaseControl {
      async handleChange(files){
        if(!files || !files.length) return;
        const file = files[0];
        try{
          const url = await uploadToR2(file);
          dbg('uploaded url', url);
          this.props.onChange(url);
        }catch(err){
          console.error('Upload failed', err);
          alert('Upload failed: ' + (err && err.message ? err.message : String(err)));
        }
      }
    }

    CMS.registerWidget('image', R2ImageControl, widget.previewComponent);
    dbg('image widget patched');
  }catch(e){
    dbg('patchImageWidget error', String(e));
    console.error(e);
  }
}

/* Initialize flow */
(async function initFlow(){
  dbg('waiting for CMS global');
  try{
    const CMS = await waitForCMS(8000);
    dbg('CMS global found');

    // safe init
    try{
      dbg('calling CMS.init()');
      CMS.init();
      dbg('CMS.init returned');
    }catch(initErr){
      dbg('CMS.init threw', (initErr && initErr.message) ? initErr.message : String(initErr));
      console.error('CMS.init threw', initErr);
      // don't abort — still try to patch widget if CMS object exists
    }

    // patch widget after a short delay to ensure internals are set up
    setTimeout(()=>patchImageWidgetOnce(CMS), 200);

  }catch(err){
    dbg('failed to get CMS global', (err && err.message) ? err.message : String(err));
    console.error(err);
    alert('Admin UI failed to initialize: ' + (err && err.message ? err.message : String(err)));
  }
})();
</script>
</body>
</html>
