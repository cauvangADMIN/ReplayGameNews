<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8"/>
<title>ReplayGameNews CMS</title>
<meta name="viewport" content="width=device-width,initial-scale=1"/>

<script src="https://unpkg.com/decap-cms@3.10.1/dist/decap-cms.js"></script>

<style>
#cms-debug{
position:fixed;
right:10px;
bottom:10px;
z-index:9999;
max-width:400px;
max-height:40vh;
overflow:auto;
background:#000;
color:#0f0;
font-family:monospace;
font-size:12px;
padding:8px;
border-radius:6px;
display:none;
}
</style>

</head>

<body>

<div id="nc-root"></div>
<div id="cms-debug"></div>

<script>

function dbg(msg,obj){
const box=document.getElementById("cms-debug")
box.style.display="block"

const line=document.createElement("div")
line.textContent=new Date().toLocaleTimeString()+" "+msg
box.appendChild(line)

if(obj){
const pre=document.createElement("pre")
pre.textContent=JSON.stringify(obj,null,2)
box.appendChild(pre)
}

console.log(msg,obj||"")
}


async function uploadToR2(file){

dbg("upload start",{name:file.name})

const form=new FormData()
form.append("file",file,file.name)

const res=await fetch("/api/upload",{
method:"POST",
body:form
})

dbg("upload status",res.status)

if(!res.ok) throw new Error("upload failed")

const data=await res.json()

dbg("upload response",data)

return data.path || data.url

}


function patchImageWidget(){

if(!window.CMS) return

const widget=CMS.getWidget("image")

if(!widget) return

const Base=widget.controlComponent

class R2ImageControl extends Base{

async handleChange(files){

if(!files || !files.length) return

const file=files[0]

try{

const url=await uploadToR2(file)

dbg("uploaded url",url)

this.props.onChange(url)

}catch(e){

console.error(e)
alert("Upload failed "+e.message)

}

}

}

CMS.registerWidget("image",R2ImageControl,widget.previewComponent)

dbg("image widget patched")

}


function waitCMS(){

if(window.CMS){

patchImageWidget()
return

}

setTimeout(waitCMS,200)

}

waitCMS()

</script>

</body>
</html>
