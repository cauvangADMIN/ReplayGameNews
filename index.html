<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />

  <title>ReplayGameNews — Trang chủ</title>

  <link rel="stylesheet" href="styles/styles.css">
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXX" crossorigin="anonymous"></script>
  <!-- markdown parser -->
  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>

  <script src="js/main.js" defer></script>

</head>


<body>

<header class="site-header">

  <div class="container">

    <a class="logo" href="/">ReplayGameNews</a>

    <nav class="main-nav">
      <a href="/">Home</a>
      <a href="#latest" id="nav-latest">Latest</a>
    </nav>

  </div>

</header>



<main class="container">


  <!-- HERO -->
  <section id="hero-section" class="hero">
    <!-- filled by JS -->
  </section>



  <!-- TOP BANNER AD -->
  <section class="top-ad">

    <div class="ad-banner">

      <!-- Google AdSense placeholder -->

      <!--
      <ins class="adsbygoogle"
           style="display:block"
           data-ad-client="ca-pub-XXXX"
           data-ad-slot="XXXX"
           data-ad-format="auto"
           data-full-width-responsive="true"></ins>
      -->

      <div class="ad-placeholder">
        AD BANNER 970 × 90
      </div>

    </div>

  </section>



  <!-- MAIN CONTENT -->
  <div class="content-wrap">


    <!-- GRID POSTS -->
    <section id="main-grid" class="grid">
      <!-- filled by JS -->
    </section>


    <!-- SIDEBAR -->
    <aside class="sidebar" id="sidebar">

      <div class="widget">

        <h4>Video nổi bật</h4>

        <div class="video-thumb">

          <iframe
            width="100%"
            height="160"
            src="https://www.youtube.com/embed/dQw4w9WgXcQ"
            title="Featured"
            frameborder="0"
            loading="lazy"
            allowfullscreen>

          </iframe>

        </div>

      </div>


      <!-- <div class="widget ad">

        <div class="ad-box">
          AD 300 × 250
        </div>

      </div>

      <div class="widget ad">
        <div class="ad-box ad-300x600">
          AD 300 × 600
        </div>
      </div> -->

      <div class="widget ad">
          <div id="mobile-rotating-ad"></div>
      </div>

    </aside>


  </div>



  <!-- CATEGORY BAR -->
<section id="category-section" class="category-bar-wrapper">

    <div class="category-bar">

      <button class="cat-tab active">Latest</button>

      <button class="cat-tab">Games</button>

      <button class="cat-tab">Movies</button>

      <button class="cat-tab">Characters</button>

      <button class="cat-tab">Technology</button>

    </div>

    <div class="category-bar-scroll"></div>

  </section>

  <!-- POSTS -->
  <section class="latest-section">

    <h2 id="section-title" class="latest-title">
      Latest News
    </h2>

    <div id="posts-list" class="latest-list"></div>

  </section>

  <div class="bottom-ad">
    <div class="ad-placeholder ad-970x250">
      AD 970 × 250
    </div>
  </div>

  <!-- MORE POSTS -->
  <section class="more-section" id="more-section">
    <!-- filled by JS -->
  </section>


</main>



<footer class="site-footer">

  <div class="container">

    © <span id="year"></span>
    ReplayGameNews

  </div>

  <div class="footer-nav">
    <a href="/privacy-policy.html">Privacy</a>
    <a href="/about.html">About</a>
    <a href="/contact.html">Contact</a>
  </div>

</footer>



<script>

document.getElementById("year").innerText =
  new Date().getFullYear()

</script>



</body>
</html>
