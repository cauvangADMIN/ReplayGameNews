<!doctype html>
<html lang="vi">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="description" content="">
  <meta property="og:title" content="">
  <meta property="og:image" content="">
  <title id="page-title">ReplayGameNews</title>

  <link rel="stylesheet" href="/styles/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js" defer></script>
  <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-XXXX" crossorigin="anonymous"></script>
  <script>

  // Get slug from query OR pretty URL
  function getSlug(){

    const url = new URL(location.href)

    // Case 1: /post.html?slug=xxx
    let slug = url.searchParams.get("slug")

    // Case 2: /resident-evil-puzzle
    if(!slug){
      const path = location.pathname.split("/")
      slug = path[path.length - 1]
    }

    return slug
  }


  async function loadPost(){

    const slug = getSlug()

    if(!slug){
      document.body.innerHTML = "<p>Missing slug</p>"
      return
    }

    try{

      const res = await fetch(`/posts/${slug}.md`, { cache:"no-store" })

      if(!res.ok){
        document.body.innerHTML = "<p>Post not found</p>"
        return
      }

      const md = await res.text()

      // Parse frontmatter
      const fmMatch = md.match(/^---\n([\s\S]*?)\n---\n([\s\S]*)$/)

      let meta = {}
      let content = md

      if(fmMatch){

        const fm = fmMatch[1]
        content = fmMatch[2]

        fm.split("\n").forEach(line=>{

          const [k,...rest] = line.split(":")

          if(k && rest){
            meta[k.trim()] = rest.join(":").trim()
          }

        })

      }

      // Title
      document.getElementById("page-title").innerText = meta.title || slug
      document.getElementById("post-title").innerText = meta.title || slug

      // Thumbnail
      if(meta.thumbnail){

        document.getElementById("post-thumb").src = meta.thumbnail

      } else {

        document.getElementById("post-thumb").style.display = "none"

      }

      // Meta
      document.getElementById("post-meta").innerText =
        `${meta.date || ""} • ${meta.category || ""}`

      // Content
      const html = marked.parse(content)

      const container = document.getElementById("post-content")

      container.innerHTML = html

      const paragraphs = container.querySelectorAll("p")

      let insertedAds = 0
      let lastAdIndex = -10

      paragraphs.forEach((p,i)=>{

        if(insertedAds >= 4) return

        // đảm bảo khoảng cách giữa ads
        if(i - lastAdIndex < 4) return

        // skip nếu paragraph quá ngắn
        if(p.innerText.length < 120) return

        // skip nếu gần image
        const next = p.nextElementSibling
        if(next && next.tagName === "IMG") return

        const ad = document.createElement("div")

        ad.className = "article-ad"

        ad.innerHTML = `
          <ins class="adsbygoogle"
              style="display:block"
              data-ad-client="ca-pub-XXXX"
              data-ad-slot="XXXX"
              data-ad-format="auto"
              data-full-width-responsive="true"></ins>
        `

        p.after(ad)

        insertedAds++
        lastAdIndex = i

      })

      /* trigger adsense */

      if(window.adsbygoogle){
        document.querySelectorAll(".article-ad ins")
        .forEach(()=> (adsbygoogle = window.adsbygoogle || []).push({}))
      }

      document
      .querySelectorAll(".sticky-ad ins")
      .forEach(()=> (adsbygoogle = window.adsbygoogle || []).push({}))

    }
    catch(e){

      console.error(e)
      document.body.innerHTML = "<p>Error loading post</p>"

    }

    // render top + bottom ads
    /* trigger adsense */

    if(window.adsbygoogle){

      document
      .querySelectorAll(".article-ad ins")
      .forEach(()=> (adsbygoogle = window.adsbygoogle || []).push({}))

      document
      .querySelectorAll(".article-top-ad ins, .article-bottom-ad ins")
      .forEach(()=> (adsbygoogle = window.adsbygoogle || []).push({}))

    }

  }

  document.addEventListener("DOMContentLoaded", loadPost)

  </script>

</head>


<body>

<div class="sticky-ad sticky-left">
  <ins class="adsbygoogle"
       style="display:block;width:160px;height:600px"
       data-ad-client="ca-pub-XXXX"
       data-ad-slot="XXXX"></ins>
</div>

<div class="sticky-ad sticky-right">
  <ins class="adsbygoogle"
       style="display:block;width:160px;height:600px"
       data-ad-client="ca-pub-XXXX"
       data-ad-slot="XXXX"></ins>
</div>

<header class="site-header container">
  <a class="logo" href="/">ReplayGameNews</a>
</header>


<main class="container post-container">

  <article class="post">

    <h1 id="post-title">...</h1>

    <img id="post-thumb" alt="thumbnail">

    <div class="meta" id="post-meta"></div>

    <div class="article-top-ad">
    <ins class="adsbygoogle"
        style="display:block"
        data-ad-client="ca-pub-XXXX"
        data-ad-slot="XXXX"
        data-ad-format="auto"
        data-full-width-responsive="true"></ins>

    </div>

    <div id="post-content" class="post-body"></div>

  </article>

</main>

<div class="article-bottom-ad">

  <ins class="adsbygoogle"
       style="display:block"
       data-ad-client="ca-pub-XXXX"
       data-ad-slot="XXXX"
       data-ad-format="auto"
       data-full-width-responsive="true"></ins>

</div>

<footer class="site-footer container">
  © <span id="year2"></span> ReplayGameNews
</footer>

<script>
document.getElementById("year2").innerText = new Date().getFullYear()
</script>

</body>
</html>
